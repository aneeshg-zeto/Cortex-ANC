# Cortex platform — local full stack
# Postgres uses host port 5434 to avoid conflict with local Postgres on 5432/5433

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortex-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    volumes:
      - cortex_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cortex -d cortex']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [cortex]

  redis:
    image: redis:7-alpine
    container_name: cortex-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - cortex_redis_data:/data
    networks: [cortex]

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: cortex-kafka
    restart: unless-stopped
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MDEyMzQ1Njc4OTAxMjM0NQ
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks: [cortex]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cortex-kafka-ui
    restart: unless-stopped
    ports:
      - '9080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: cortex
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]
    networks: [cortex]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: cortex-elasticsearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    volumes:
      - cortex_es_data:/usr/share/elasticsearch/data
    networks: [cortex]

  neo4j:
    image: neo4j:5-community
    container_name: cortex-neo4j
    restart: unless-stopped
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/cortexneo4j
    volumes:
      - cortex_neo4j_data:/data
    networks: [cortex]

  temporal:
    image: temporalio/auto-setup:1.25.1
    container_name: cortex-temporal
    restart: unless-stopped
    ports:
      - '7233:7233'
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: cortex
      POSTGRES_PWD: cortex
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cortex]

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: cortex-temporal-ui
    restart: unless-stopped
    ports:
      - '8088:8080'
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    depends_on: [temporal]
    networks: [cortex]

  loki:
    image: grafana/loki:3.0.0
    container_name: cortex-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    networks: [cortex]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: cortex-litellm
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    command: ['--port', '4000', '--config', '/app/config.yaml']
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    networks: [cortex]

  nango:
    image: nangohq/nango-server:latest
    container_name: cortex-nango
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NANGO_DATABASE_URL: postgresql://cortex:cortex@postgres:5432/cortex
      NANGO_SERVER_URL: http://localhost:3003
      NANGO_CALLBACK_URL: http://localhost:3003/oauth/callback
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cortex]

volumes:
  cortex_pg_data:
  cortex_redis_data:
  cortex_es_data:
  cortex_neo4j_data:

networks:
  cortex:
    driver: bridge
