services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortex-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'  # 5434 avoids conflict with local Postgres on 5432/5433
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    volumes:
      - cortex_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cortex -d cortex']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cortex_pg_data:
