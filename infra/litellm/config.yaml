model_list:
  - model_name: cortex-groq
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  # Fallback when Groq hits TPD/RPM limits — Gemini 2.0 Flash (AI Studio free tier)
  - model_name: cortex-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  # Batch embeddings (Gemini embed via same LiteLLM gateway)
  - model_name: cortex-embed
    litellm_params:
      model: gemini/text-embedding-004
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  num_retries: 1
  request_timeout: 60
  fallbacks:
    - cortex-groq: [cortex-gemini]

general_settings:
  master_key: cortex-local-dev
